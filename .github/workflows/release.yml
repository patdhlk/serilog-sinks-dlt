name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Pack
        run: dotnet pack src/Serilog.Sinks.Dlt -c Release -o artifacts/ -p:Version=${{ steps.ver.outputs.version }}
      - name: Publish to NuGet
        run: dotnet nuget push 'artifacts/*.nupkg' --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
