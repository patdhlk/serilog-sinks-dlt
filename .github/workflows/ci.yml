name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build --filter "Category!=RealDaemon" --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'

  integration-dlt-daemon:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Run integration tests inside dlt-daemon dev container
        run: |
          docker build -f docker/Dockerfile -t serilog-sinks-dlt-dev .
          docker run --rm -v "$PWD:/workspace" serilog-sinks-dlt-dev \
              dotnet test tests/Serilog.Sinks.Dlt.IntegrationTests \
                  -c Release \
                  --filter "Category=RealDaemon" \
                  --logger "trx"
      - name: Show daemon trace on failure
        if: failure()
        run: |
          ls -la /var/log/dlt
          sudo dlt-convert -a /var/log/dlt/*.dlt || true
