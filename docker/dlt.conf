# dlt-daemon configuration for the Serilog.Sinks.Dlt dev container.
# Trace files land in /var/log/dlt as numbered .dlt files; the integration
# tests read them back with `dlt-convert -a`.
OfflineTraceDirectory = /var/log/dlt
OfflineTraceFileSize  = 10000000
OfflineTraceMaxSize   = 50000000
ControlSocketPath     = /tmp/dlt-ctrl.sock
